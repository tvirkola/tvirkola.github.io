function renderPapers(list, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = list.map(p => {
    const validLinks = (p.links || []).filter(([, url]) => url && url !== '#');
    const primaryLink = validLinks.length ? validLinks[0][1] : null;
    const extraLinks = validLinks.slice(1);
    const titleHtml = primaryLink
      ? `<a href="${primaryLink}" class="paper-title-link">${p.title}</a>`
      : p.title;
    const linksHtml = extraLinks.length
      ? `<span class="paper-inline-links">${extraLinks.map(([label, url]) => `[<a href="${url}">${label}</a>]`).join(' ')}</span>`
      : '';
    const rows = [];
    if (p.coauthors) rows.push(`<div class="paper-meta">${p.coauthors}</div>`);
    if (p.badge || linksHtml) {
      const parts = [];
      if (p.badge) parts.push(`<span class="journal">${p.badge}</span>`);
      if (linksHtml) parts.push(linksHtml);
      rows.push(`<div class="paper-meta">${parts.join(' ')}</div>`);
    }
    return `
      <div class="paper">
        <div class="paper-title">${titleHtml}</div>
        ${rows.join('')}
      </div>
    `;
  }).join('');
}

function renderPublications(list, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = list.map(p => {
    const validLinks = (p.links || []).filter(([, url]) => url && url !== '#');
    const primaryLink = validLinks.length ? validLinks[0][1] : null;
    const extraLinks = validLinks.slice(1);
    const titleHtml = primaryLink
      ? `<a href="${primaryLink}" class="paper-title-link">${p.title}</a>`
      : p.title;
    const linksHtml = extraLinks.length
      ? `<div class="paper-meta"><span class="paper-inline-links">${extraLinks.map(([label, url]) => `[<a href="${url}">${label}</a>]`).join(' ')}</span></div>`
      : '';
    return `
      <div class="paper">
        <div class="paper-title">${titleHtml}</div>
        <div class="paper-meta">
          ${p.coauthors}<br>
          <span class="journal">${p.journal}</span>, ${p.year}${p.volume ? ', ' + p.volume : ''}${p.pages ? ', ' + p.pages : ''}
        </div>
        ${linksHtml}
      </div>
    `;
  }).join('');
}

function renderPolicy(list, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = list.map(p => {
    const titleHtml = p.link
      ? `<a href="${p.link}" class="paper-title-link">${p.title}</a>`
      : p.title;
    const langNote = p.lang === 'fi' ? ' <span class="lang-note">in Finnish</span>' : '';
    return `
      <div class="policy-item">
        <div class="policy-title">${titleHtml}</div>
        <div class="policy-meta">${p.meta}${langNote}</div>
      </div>
    `;
  }).join('');
}

  const sections = document.querySelectorAll('section[id]');
  const navLinks = document.querySelectorAll('nav a[href^="#"]');
  const sectionObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const active = document.querySelector(`nav a[href="#${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  sections.forEach(s => sectionObserver.observe(s));
});
</script>
