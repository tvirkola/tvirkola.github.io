function renderPapers(list, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = list.map(p => {
    const primaryLink = p.links && p.links.length && p.links[0][1] !== '#' ? p.links[0][1] : null;
    const extraLinks = primaryLink ? p.links.slice(1) : p.links || [];
    const titleHtml = primaryLink
      ? `<a href="${primaryLink}" class="paper-title-link">${p.title}</a>`
      : p.title;
    const metaParts = [];
    if (p.coauthors) metaParts.push(p.coauthors);
    if (p.badge) metaParts.push(`<span class="journal">${p.badge}</span>`);
    return `
      <div class="paper">
        <div class="paper-title">${titleHtml}</div>
        ${metaParts.length ? `<div class="paper-meta">${metaParts.join('<br>')}</div>` : ''}
        ${extraLinks.filter(([,url]) => url !== '#').length ? `<div class="paper-links">${extraLinks.filter(([,url]) => url !== '#').map(([label, url]) => `<a href="${url}">${label}</a>`).join('')}</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderPublications(list, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = list.map(p => {
    const primaryLink = p.links && p.links.length && p.links[0][1] !== '#' ? p.links[0][1] : null;
    const extraLinks = primaryLink ? p.links.slice(1) : p.links || [];
    const titleHtml = primaryLink
      ? `<a href="${primaryLink}" class="paper-title-link">${p.title}</a>`
      : p.title;
    return `
      <div class="paper">
        <div class="paper-title">${titleHtml}</div>
        <div class="paper-meta">
          ${p.coauthors}<br>
          <span class="journal">${p.journal}</span>, ${p.year}${p.volume ? ', ' + p.volume : ''}${p.pages ? ', ' + p.pages : ''}
        </div>
        ${extraLinks.filter(([,url]) => url !== '#').length ? `<div class="paper-links">${extraLinks.filter(([,url]) => url !== '#').map(([label, url]) => `<a href="${url}">${label}</a>`).join('')}</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderPolicy(list, containerId) {
  const el = document.getElementById(containerId);

        <div class="policy-meta">${p.meta}</div>
      </div>
    `;
  }).join('');
}
